{% extends 'base.html' %}
{% load static %}
{% block title %}web上でサブスクを管理できるサービス｜サブスク一覧{% endblock %}

{% block header %}
        <!-- Header-->
        <header class="masthead text-center text-white">
            <div class="masthead-content">
                <div class="container px-5">
                    <h1 class="masthead-heading mb-0">サブスク一覧</h1>
                    <h2 class="masthead-subheading mb-0">あなた専用のサブスク管理サービス</h2>
                    <!-- ★★★ 2025-02-22変更 ★★★ログインボタンに変更 -->
                    <!-- <a class="btn btn-primary btn-xl rounded-pill mt-5" href="#scroll">Learn More</a> -->
                    <a href="{% url 'account_login' %}" class="btn btn-primary btn-xl rounded-pill mt-5">Log In</a>
                </div>
            </div>
            <div class="bg-circle-1 bg-circle"></div>
            <div class="bg-circle-2 bg-circle"></div>
            <div class="bg-circle-3 bg-circle"></div>
            <div class="bg-circle-4 bg-circle"></div>
        </header>
{% endblock %}
{% block content %}
        <!-- Content section 1-->
        <section>
            <div class="container px-5">
                <div class="row gx-5 align-items-center">
                    <!-- ★★★ 2025-02-20変更 ★★★<div class="col-lg-6"> -->
                    <div class="col-lg-6 order-lg-2">
                        <div class="p-5"><img class="img-fluid rounded-circle" src="{% static 'assets/img/01.jpg' %}" alt="..." /></div>
                    </div>
                    <div class="col-lg-6 order-lg-1" >
                        <div class="p-5">
                            <h2 class="display-4">サブスク管理</h2>
                            <p>契約しているサブスクをまとめて管理できます</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Content section 2-->
        <section>
            <div class="container px-5">
                <div class="row gx-5 align-items-center">
                    <div class="col-lg-6">
                        <div class="p-5"><img class="img-fluid rounded-circle" src="{% static 'assets/img/02.jpg' %}" alt="..." /></div>
                    </div>
                    <div class="col-lg-6">
                        <div class="p-5">
                            <h2 class="display-4">料金を見える化</h2>
                            <p>毎月いくら使っているかを把握できます</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Content section 3-->
        <section>
            <div class="container px-5">
                <div class="row gx-5 align-items-center">
                    <div class="col-lg-6 order-lg-2">
                        <div class="p-5"><img class="img-fluid rounded-circle" src="{% static 'assets/img/03.jpg' %}"alt="..." /></div>
                    </div>
                    <div class="col-lg-6  order-lg-1">
                        <div class="p-5">
                            <h2 class="display-4">更新忘れ防止</h2>
                            <p>更新日を記録して、無駄な課金を防ぎます</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
{% endblock %}
