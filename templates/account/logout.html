{% extends 'base.html' %}

{% block title %}ログアウト | Subsc Manager{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">
            <div class="my-div-style w-100 text-center">
                <h1 class="mb-4">ログアウト</h1>

                <p>ログアウトしますか？</p>

                <form method="post" action="{% url 'account_logout' %}">
                    {% csrf_token %}
                    <button class="btn btn-danger w-100 mt-3" type="submit">
                        ログアウト
                    </button>
                </form>

                <p class="mt-3">
                    <a href="{% url 'subscriptions:subscription_list' %}">
                        戻る
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
